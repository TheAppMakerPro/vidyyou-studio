<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#09090b" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Vidyyou" />
  <meta name="description" content="AI Music Video + Lip Sync + Video Transforms Studio" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png" />
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <title>Vidyyou Studio</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root { width: 100%; height: 100%; overflow-x: hidden; background: #09090b; }
    #splash {
      position: fixed; inset: 0; z-index: 9999;
      background: #09090b;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      transition: opacity 0.5s ease;
    }
    #splash.hide { opacity: 0; pointer-events: none; }
    #splash img {
      width: 72px; height: 72px; border-radius: 16px; margin-bottom: 20px;
      box-shadow: 0 0 40px rgba(99,102,241,0.3), 0 0 80px rgba(99,102,241,0.1);
    }
    #splash h1 {
      color: #fff; font-family: system-ui; font-size: 26px; font-weight: 700;
      letter-spacing: 3px;
    }
    #splash p {
      color: #6366f1; font-family: system-ui; font-size: 11px;
      margin-top: 6px; letter-spacing: 2px; font-weight: 500;
    }
    #splash .loader {
      width: 32px; height: 32px;
      border: 2px solid rgba(99,102,241,0.1);
      border-top-color: #6366f1;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-top: 28px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>
  <!-- Splash Screen -->
  <div id="splash">
    <img src="icons/icon-192.png" alt="Vidyyou" />
    <h1>VIDYYOU</h1>
    <p>AI VIDEO STUDIO</p>
    <div class="loader"></div>
  </div>

  <div id="root"></div>

  <!-- React + Dependencies -->
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/lucide-react@0.383.0/dist/umd/lucide-react.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- App -->
  <script type="text/babel" data-type="module" src="app.jsx"></script>

  <script type="text/babel">
    window.addEventListener('load', () => {
      setTimeout(() => {
        const splash = document.getElementById('splash');
        if (splash) splash.classList.add('hide');
        setTimeout(() => splash?.remove(), 600);
      }, 800);
    });
  </script>

  <!-- Service Worker Registration -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js')
          .then(r => console.log('SW registered:', r.scope))
          .catch(e => console.log('SW failed:', e));
      });
    }
  </script>
</body>
</html>
